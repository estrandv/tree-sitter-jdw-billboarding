name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install tree-sitter CLI
        run: npm install tree-sitter-cli@^0.25.3
      - name: Run corpus tests
        run: npx tree-sitter test

  build-wheels:
    if: github.event_name == 'release'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build deps
        run: pip install build 'wheel>=0.42'
      - name: Build wheel
        run: python -m build
      - name: Retag wheel for manylinux
        run: |
          wheel tags --platform-tag manylinux_2_17_x86_64 dist/*.whl
          rm -f dist/*linux_x86_64.whl
      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/*.whl

  publish-pypi:
    if: github.event_name == 'release'
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
